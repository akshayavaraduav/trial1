name: Deploy to GCP
on:
  push:
    branches: [ main ] # Runs when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Google Cloud Auth
        uses: 'google-github-actions/auth@v0'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Build and Push to Cloud Run
        run: |
          gcloud builds submit --tag gcr.io/logistic-model-deploy/my-api
          gcloud run deploy my-api --image gcr.io/logistic-model-deploy/my-api --platform managed --region us-central1 --allow-unauthenticated